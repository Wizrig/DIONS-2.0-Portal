<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DIONS 2.0 — Dions20 Update</title>
  <meta http-equiv="refresh" content="0; url=/DIONS-2.0-Portal/testnet-update-1.html" />
  <style>
    :root {
      --bg: #070a14;
      --fg: #eaf0ff;
      --muted: #b9c5ea;
      --accent: #ff7a1a;
      --accent2: #ffb347;
      --line: rgba(255,255,255,.14);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--fg);
      background:
        radial-gradient(900px 500px at 10% -10%, rgba(78,161,255,.25), transparent 60%),
        radial-gradient(700px 450px at 95% -20%, rgba(255,79,163,.18), transparent 60%),
        linear-gradient(180deg, #05070d, #0c1222 65%, #0b1020 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: min(900px, 100%);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 28px;
      background: rgba(17,23,42,.55);
      box-shadow: 0 24px 80px rgba(0,0,0,.4);
    }
    .kicker {
      font-size: .78rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #6ec1ff;
      font-weight: 800;
      margin-bottom: 10px;
    }
    h1 { margin: 0 0 10px 0; font-size: clamp(1.8rem, 5vw, 2.8rem); }
    p { margin: 0 0 16px 0; color: var(--muted); line-height: 1.7; }
    .release { color: #ffd8be; font-weight: 700; margin-bottom: 12px; }
    .link {
      display: inline-block;
      text-decoration: none;
      color: #fff;
      font-weight: 800;
      letter-spacing: .02em;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border-radius: 10px;
      padding: 12px 16px;
      animation: pulse 1.05s infinite;
    }
    @keyframes pulse {
      0% { transform: translateY(0); box-shadow: 0 0 0 0 rgba(255,122,26,.72); }
      60% { transform: translateY(-1px); box-shadow: 0 0 0 14px rgba(255,122,26,0); }
      100% { transform: translateY(0); box-shadow: 0 0 0 0 rgba(255,122,26,0); }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="kicker">DIONS 2.0 · Portal Update</div>
    <h1>Testnet Update 1</h1>
    <p class="release">Public Release Sept – December 2026</p>
    <p>This page redirects to the full technical update. If redirect does not trigger, use the link below.</p>
    <a class="link" href="/DIONS-2.0-Portal/testnet-update-1.html">Open Testnet Update 1</a>
  </main>
</body>
</html>
