<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DIONS 2.0 — Portal</title>
  <style>
    :root {
      --bg: #050811;
      --line: rgba(255,255,255,.12);
      --text: #e8eeff;
      --muted: #b3c0ea;
      --orange1: #ffb15a;
      --orange2: #ff7a1a;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); }

    .update-strip {
      position: sticky;
      top: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(11,16,32,.96), rgba(18,24,45,.96));
      backdrop-filter: blur(8px);
    }
    .update-label {
      color: #ffd9bf;
      font-size: .82rem;
      font-weight: 700;
      letter-spacing: .04em;
      white-space: nowrap;
    }
    .update-link {
      text-decoration: none;
      color: #fff;
      font-weight: 800;
      font-size: .86rem;
      letter-spacing: .02em;
      padding: 9px 14px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--orange1), var(--orange2));
      animation: pulse 1.05s infinite;
      box-shadow: 0 8px 24px rgba(255,122,26,.35);
    }
    .update-link:hover { filter: brightness(1.06); }

    @keyframes pulse {
      0% { transform: translateY(0); box-shadow: 0 0 0 0 rgba(255,122,26,.72); }
      60% { transform: translateY(-1px); box-shadow: 0 0 0 14px rgba(255,122,26,0); }
      100% { transform: translateY(0); box-shadow: 0 0 0 0 rgba(255,122,26,0); }
    }

    iframe {
      width: 100%;
      height: calc(100vh - 58px);
      border: 0;
      display: block;
      background: #000;
    }

    @media (max-width: 720px) {
      .update-strip { flex-direction: column; gap: 8px; padding: 10px; }
      .update-label { font-size: .78rem; }
      .update-link { width: 100%; text-align: center; }
      iframe { height: calc(100vh - 95px); }
    }
  </style>
</head>
<body>
  <div class="update-strip">
    <div class="update-label">Public Release Sept – December 2026</div>
    <a class="update-link" href="testnet-update-1.html">Testnet Update 1</a>
  </div>
  <iframe src="index-legacy.html" title="DIONS 2.0 Portal"></iframe>
</body>
</html>
