<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DIONS 2.0</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      overflow-x: hidden;
      background: #000;
    }
    iframe {
      width: 100%;
      height: auto;
      min-height: 0;
      border: 0;
      display: block;
      background: #000;
    }
  </style>
</head>
<body>
  <iframe id="portalFrame" src="index-legacy.html" title="DIONS 2.0 Portal"></iframe>

  <script>
    (function () {
      'use strict';

      function injectUpdate(doc) {
        if (!doc || doc.getElementById('testnet-update-inline')) return;

        const release = doc.querySelector('.hero-release');
        if (!release) return;

        const style = doc.createElement('style');
        style.textContent = `
          html, body {
            background: #000 !important;
            overflow-y: hidden !important;
          }
          .hero-release {
            margin-bottom: 0.35rem !important;
          }
          .testnet-update-inline-wrap {
            display: flex;
            justify-content: center;
            margin-top: 0;
            margin-bottom: 1.2rem;
          }
          .testnet-update-inline {
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #ffd8b9;
            font-weight: 700;
            font-size: .84rem;
            letter-spacing: .02em;
            animation: testnetBlink 1.05s infinite;
          }
          .testnet-update-inline::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: #ff7a1a;
            box-shadow: 0 0 0 0 rgba(255,122,26,.7);
            animation: testnetDot 1.05s infinite;
          }
          @keyframes testnetBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: .35; }
          }
          @keyframes testnetDot {
            0% { box-shadow: 0 0 0 0 rgba(255,122,26,.7); }
            70% { box-shadow: 0 0 0 8px rgba(255,122,26,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,122,26,0); }
          }
        `;
        doc.head.appendChild(style);

        const wrap = doc.createElement('div');
        wrap.className = 'testnet-update-inline-wrap';
        wrap.id = 'testnet-update-inline';

        const link = doc.createElement('a');
        link.className = 'testnet-update-inline';
        link.href = 'https://www.iocoin.io/testnetlive';
        link.target = '_top';
        link.rel = 'noopener noreferrer';
        link.textContent = 'Testnet Update 1';

        wrap.appendChild(link);
        release.insertAdjacentElement('afterend', wrap);
      }

      const frame = document.getElementById('portalFrame');
      function fitFrameHeight() {
        try {
          const doc = frame.contentDocument || frame.contentWindow.document;
          const h = Math.max(doc.documentElement.scrollHeight, doc.body.scrollHeight);
          frame.style.height = h + 'px';
        } catch (_) {}
      }
      frame.addEventListener('load', function () {
        try {
          injectUpdate(frame.contentDocument || frame.contentWindow.document);
        } catch (_) {}
        fitFrameHeight();
        setTimeout(fitFrameHeight, 250);
        setTimeout(fitFrameHeight, 1200);
      });
    })();
  </script>
</body>
</html>
